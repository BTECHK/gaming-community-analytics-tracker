<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     version="1.1" width="1200px" height="700px" viewBox="0 0 1200 700"
     content="&lt;mxfile host=&quot;app.diagrams.net&quot; modified=&quot;2026-04-11T00:00:00.000Z&quot; agent=&quot;Claude&quot; version=&quot;26.0.0&quot; type=&quot;device&quot;&gt;&lt;diagram id=&quot;ingestion&quot; name=&quot;Multi-Source Ingestion&quot;&gt;&lt;mxGraphModel dx=&quot;0&quot; dy=&quot;0&quot; grid=&quot;1&quot; gridSize=&quot;10&quot; guides=&quot;1&quot; tooltips=&quot;1&quot; connect=&quot;1&quot; arrows=&quot;1&quot; fold=&quot;1&quot; page=&quot;1&quot; pageScale=&quot;1&quot; pageWidth=&quot;1200&quot; pageHeight=&quot;700&quot;&gt;&lt;root&gt;&lt;mxCell id=&quot;0&quot;/&gt;&lt;mxCell id=&quot;1&quot; parent=&quot;0&quot;/&gt;&lt;/root&gt;&lt;/mxGraphModel&gt;&lt;/diagram&gt;&lt;/mxfile&gt;">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#707070"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1168BD"/>
    </marker>
  </defs>
  <g>
    <!-- Title -->
    <text x="600" y="24" font-family="Helvetica" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">CommunityPulse — Multi-Source Ingestion Detail</text>

    <!-- ===== LEFT COLUMN: Data Sources ===== -->
    <text x="110" y="60" font-family="Helvetica" font-size="13" font-weight="bold" fill="#555555" text-anchor="middle">Data Sources</text>

    <!-- Source 1: YouTube -->
    <rect x="20" y="80" width="180" height="44" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="110" y="107" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">YouTube</text>

    <!-- Source 2: Official News -->
    <rect x="20" y="140" width="180" height="44" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="110" y="167" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Official News</text>

    <!-- Source 3: TierSite -->
    <rect x="20" y="200" width="180" height="44" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="110" y="227" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TierSite</text>

    <!-- Source 4: GuideSite -->
    <rect x="20" y="260" width="180" height="44" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="110" y="287" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">GuideSite</text>

    <!-- Source 5: News Source A -->
    <rect x="20" y="320" width="180" height="44" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="110" y="347" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">News Source A</text>

    <!-- Source 6: News Source B -->
    <rect x="20" y="380" width="180" height="44" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="110" y="407" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">News Source B</text>

    <!-- Source 7: Reddit -->
    <rect x="20" y="440" width="180" height="44" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="110" y="467" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Reddit</text>

    <!-- Source 8: Google Trends -->
    <rect x="20" y="500" width="180" height="44" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="110" y="527" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Google Trends</text>

    <!-- ===== CENTER: DataSourceAdapter Interface ===== -->
    <rect x="340" y="170" width="240" height="300" rx="10" ry="10" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="460" y="196" font-family="Helvetica" font-size="13" font-weight="bold" fill="#555555" text-anchor="middle">DataSourceAdapter</text>
    <text x="460" y="214" font-family="Helvetica" font-size="11" fill="#888888" text-anchor="middle">&lt;&lt;interface&gt;&gt;</text>

    <!-- Interface methods -->
    <rect x="365" y="235" width="190" height="28" rx="4" ry="4" fill="#85BBF0" stroke="#5A9BD5" stroke-width="1"/>
    <text x="460" y="254" font-family="Helvetica" font-size="11" fill="#000000" text-anchor="middle">fetch_posts()</text>

    <rect x="365" y="275" width="190" height="28" rx="4" ry="4" fill="#85BBF0" stroke="#5A9BD5" stroke-width="1"/>
    <text x="460" y="294" font-family="Helvetica" font-size="11" fill="#000000" text-anchor="middle">normalize(raw_data)</text>

    <rect x="365" y="315" width="190" height="28" rx="4" ry="4" fill="#85BBF0" stroke="#5A9BD5" stroke-width="1"/>
    <text x="460" y="334" font-family="Helvetica" font-size="11" fill="#000000" text-anchor="middle">validate(post)</text>

    <rect x="365" y="355" width="190" height="28" rx="4" ry="4" fill="#85BBF0" stroke="#5A9BD5" stroke-width="1"/>
    <text x="460" y="374" font-family="Helvetica" font-size="11" fill="#000000" text-anchor="middle">get_source_config()</text>

    <rect x="365" y="395" width="190" height="28" rx="4" ry="4" fill="#85BBF0" stroke="#5A9BD5" stroke-width="1"/>
    <text x="460" y="414" font-family="Helvetica" font-size="11" fill="#000000" text-anchor="middle">health_check()</text>

    <!-- Arrows: Sources -> Adapter -->
    <line x1="200" y1="102" x2="340" y2="250" stroke="#707070" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <line x1="200" y1="162" x2="340" y2="265" stroke="#707070" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <line x1="200" y1="222" x2="340" y2="290" stroke="#707070" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <line x1="200" y1="282" x2="340" y2="310" stroke="#707070" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <line x1="200" y1="342" x2="340" y2="340" stroke="#707070" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <line x1="200" y1="402" x2="340" y2="365" stroke="#707070" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <line x1="200" y1="462" x2="340" y2="385" stroke="#707070" stroke-width="1.2" marker-end="url(#arrowhead)"/>
    <line x1="200" y1="522" x2="340" y2="400" stroke="#707070" stroke-width="1.2" marker-end="url(#arrowhead)"/>

    <!-- ===== RIGHT: IngestionService ===== -->

    <!-- IngestionService -->
    <rect x="700" y="240" width="220" height="60" rx="8" ry="8" fill="#1168BD" stroke="#0B4884" stroke-width="2"/>
    <text x="810" y="266" font-family="Helvetica" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">IngestionService</text>
    <text x="810" y="284" font-family="Helvetica" font-size="10" fill="#FFFFFF" text-anchor="middle">orchestrates all adapters</text>

    <!-- Arrow: Adapter -> IngestionService -->
    <line x1="580" y1="320" x2="700" y2="275" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="635" y="288" font-family="Helvetica" font-size="10" fill="#999999">feeds into</text>

    <!-- Dedup -->
    <rect x="700" y="370" width="220" height="56" rx="8" ry="8" fill="#85BBF0" stroke="#5A9BD5" stroke-width="2"/>
    <text x="810" y="394" font-family="Helvetica" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Dedup</text>
    <text x="810" y="412" font-family="Helvetica" font-size="10" fill="#333333" text-anchor="middle">external_id upsert</text>

    <!-- Arrow: IngestionService -> Dedup -->
    <line x1="810" y1="300" x2="810" y2="370" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- PostgreSQL (Cylinder) -->
    <path d="M730,500 Q730,484 810,484 Q890,484 890,500 L890,564 Q890,580 810,580 Q730,580 730,564 Z" fill="#438DD5" stroke="#3A7BBD" stroke-width="2"/>
    <path d="M730,500 Q730,516 810,516 Q890,516 890,500" fill="none" stroke="#3A7BBD" stroke-width="1.5"/>
    <text x="810" y="541" font-family="Helvetica" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PostgreSQL</text>

    <!-- Arrow: Dedup -> PostgreSQL -->
    <line x1="810" y1="426" x2="810" y2="484" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="825" y="460" font-family="Helvetica" font-size="10" fill="#999999">upsert</text>

    <!-- ===== APScheduler (triggers adapters) ===== -->
    <rect x="350" y="580" width="200" height="50" rx="8" ry="8" fill="#85BBF0" stroke="#5A9BD5" stroke-width="2"/>
    <text x="450" y="602" font-family="Helvetica" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">APScheduler</text>
    <text x="450" y="619" font-family="Helvetica" font-size="10" fill="#333333" text-anchor="middle">cron / interval triggers</text>

    <!-- Arrow: APScheduler -> Adapter area -->
    <line x1="460" y1="580" x2="460" y2="470" stroke="#1168BD" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead-blue)"/>
    <text x="475" y="535" font-family="Helvetica" font-size="10" fill="#1168BD">triggers each</text>
    <text x="475" y="548" font-family="Helvetica" font-size="10" fill="#1168BD">adapter on cycle</text>

    <!-- ===== YouTube Quota Tracker (side component) ===== -->
    <rect x="1000" y="90" width="180" height="80" rx="8" ry="8" fill="#85BBF0" stroke="#5A9BD5" stroke-width="2"/>
    <text x="1090" y="118" font-family="Helvetica" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">YouTube Quota</text>
    <text x="1090" y="136" font-family="Helvetica" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Tracker</text>
    <text x="1090" y="155" font-family="Helvetica" font-size="10" fill="#333333" text-anchor="middle">10,000 units/day limit</text>

    <!-- Arrow from YouTube source to quota tracker -->
    <line x1="200" y1="90" x2="250" y2="60" stroke="#707070" stroke-width="1" stroke-dasharray="4,3"/>
    <path d="M110,80 L110,50 L1000,50 L1000,100" fill="none" stroke="#707070" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
    <text x="550" y="44" font-family="Helvetica" font-size="10" fill="#999999">quota enforcement on YouTube adapter</text>

    <!-- Arrow from Quota Tracker to IngestionService -->
    <line x1="1090" y1="170" x2="1090" y2="270" stroke="#707070" stroke-width="1.2" stroke-dasharray="5,3"/>
    <line x1="1090" y1="270" x2="920" y2="270" stroke="#707070" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
    <text x="1010" y="260" font-family="Helvetica" font-size="10" fill="#999999">rate limits</text>

    <!-- Legend -->
    <rect x="30" y="620" width="280" height="60" rx="6" ry="6" fill="#F8F8F8" stroke="#CCCCCC" stroke-width="1"/>
    <text x="50" y="642" font-family="Helvetica" font-size="11" font-weight="bold" fill="#555555">Legend:</text>
    <rect x="110" y="632" width="14" height="14" rx="3" ry="3" fill="#999999" stroke="#666666" stroke-width="1"/>
    <text x="130" y="644" font-family="Helvetica" font-size="10" fill="#666666">External Source</text>
    <rect x="230" y="632" width="14" height="14" rx="3" ry="3" fill="#85BBF0" stroke="#5A9BD5" stroke-width="1"/>
    <text x="250" y="644" font-family="Helvetica" font-size="10" fill="#666666">Component</text>
    <rect x="110" y="656" width="14" height="14" rx="3" ry="3" fill="#1168BD" stroke="#0B4884" stroke-width="1"/>
    <text x="130" y="668" font-family="Helvetica" font-size="10" fill="#666666">Container</text>
  </g>
</svg>
