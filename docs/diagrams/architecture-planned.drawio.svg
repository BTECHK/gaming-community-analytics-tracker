    <line x1="830" y1="260" x2="830" y2="540" stroke="#707070" stroke-width="0" />
    <line x1="720" y1="250" x2="400" y2="620" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="5,3"/>

    <!-- API Gateway -> Time-Series Store -->
    <line x1="680" y1="380" x2="800" y2="570" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="750" y="490" font-family="Helvetica" font-size="10" fill="#999999">trends</text>

    <!-- API Gateway -> External Sources -->
    <line x1="680" y1="345" x2="1000" y2="303" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="840" y="312" font-family="Helvetica" font-size="10" fill="#999999">fetches</text>
    <line x1="680" y1="360" x2="1000" y2="363" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="680" y1="375" x2="1000" y2="423" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="680" y1="385" x2="1000" y2="483" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
</svg>
