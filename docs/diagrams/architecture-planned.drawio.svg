    <path d="M730,590 Q730,570 840,570 Q950,570 950,590 L950,660 Q950,680 840,680 Q730,680 730,660 Z" fill="#438DD5" stroke="#3A7BBD" stroke-width="2"/>
    <path d="M730,590 Q730,610 840,610 Q950,610 950,590" fill="none" stroke="#3A7BBD" stroke-width="1.5"/>
    <text x="840" y="630" font-family="Helvetica" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Time-Series Store</text>
    <text x="840" y="648" font-family="Helvetica" font-size="10" fill="#FFFFFF" text-anchor="middle">historical trend analysis</text>

    <!-- External Systems -->
    <rect x="1000" y="280" width="170" height="46" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="1085" y="308" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">YouTube API</text>

    <rect x="1000" y="340" width="170" height="46" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="1085" y="368" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">RSS Feeds</text>

    <rect x="1000" y="400" width="170" height="46" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="1085" y="428" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Google Trends</text>

    <rect x="1000" y="460" width="170" height="46" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="1085" y="488" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Webhook Sources</text>

    <!-- Arrows -->
    <!-- User -> Frontend -->
    <line x1="560" y1="132" x2="560" y2="200" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="575" y="170" font-family="Helvetica" font-size="10" fill="#999999">browses</text>

    <!-- Frontend -> API Gateway -->
    <line x1="560" y1="260" x2="560" y2="330" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="575" y="298" font-family="Helvetica" font-size="10" fill="#999999">REST / WS</text>

    <!-- API Gateway -> Message Queue -->
    <line x1="560" y1="390" x2="560" y2="460" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="575" y="430" font-family="Helvetica" font-size="10" fill="#999999">publishes</text>

    <!-- Message Queue -> NLP Worker Pool -->
    <line x1="440" y1="480" x2="250" y2="404" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="320" y="450" font-family="Helvetica" font-size="10" fill="#999999">consumes</text>

    <!-- API Gateway -> NLP Worker Pool -->
    <line x1="440" y1="355" x2="286" y2="360" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="350" y="348" font-family="Helvetica" font-size="10" fill="#999999">dispatches</text>

    <!-- API Gateway -> PostgreSQL -->
    <line x1="480" y1="390" x2="330" y2="570" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="380" y="490" font-family="Helvetica" font-size="10" fill="#999999">reads/writes</text>

    <!-- API Gateway -> Valkey -->
    <line x1="600" y1="390" x2="580" y2="570" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="600" y="485" font-family="Helvetica" font-size="10" fill="#999999">cache</text>

    <!-- NLP Worker -> PostgreSQL -->
    <line x1="176" y1="404" x2="240" y2="570" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="178" y="495" font-family="Helvetica" font-size="10" fill="#999999">stores results</text>

    <!-- API Gateway -> User Service -->
    <line x1="680" y1="340" x2="720" y2="250" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="710" y="290" font-family="Helvetica" font-size="10" fill="#999999">auth</text>

