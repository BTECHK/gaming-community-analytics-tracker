<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     version="1.1" width="1100px" height="820px" viewBox="0 0 1100 820"
     content="&lt;mxfile host=&quot;app.diagrams.net&quot; modified=&quot;2026-04-11T00:00:00.000Z&quot; agent=&quot;Claude&quot; version=&quot;26.0.0&quot; type=&quot;device&quot;&gt;&lt;diagram id=&quot;arch-current&quot; name=&quot;Current Architecture&quot;&gt;&lt;mxGraphModel dx=&quot;0&quot; dy=&quot;0&quot; grid=&quot;1&quot; gridSize=&quot;10&quot; guides=&quot;1&quot; tooltips=&quot;1&quot; connect=&quot;1&quot; arrows=&quot;1&quot; fold=&quot;1&quot; page=&quot;1&quot; pageScale=&quot;1&quot; pageWidth=&quot;1100&quot; pageHeight=&quot;820&quot;&gt;&lt;root&gt;&lt;mxCell id=&quot;0&quot;/&gt;&lt;mxCell id=&quot;1&quot; parent=&quot;0&quot;/&gt;&lt;mxCell id=&quot;user&quot; value=&quot;User&quot; style=&quot;shape=umlActor;verticalLabelPosition=bottom;verticalAlign=top;fillColor=#438DD5;fontColor=#FFFFFF;strokeColor=#3A7BBD;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;490&quot; y=&quot;20&quot; width=&quot;40&quot; height=&quot;60&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;boundary&quot; value=&quot;CommunityPulse&quot; style=&quot;rounded=1;whiteSpace=wrap;dashed=1;fillColor=none;strokeColor=#888888;fontColor=#888888;fontSize=14;fontStyle=1;verticalAlign=top;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;60&quot; y=&quot;150&quot; width=&quot;780&quot; height=&quot;470&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;frontend&quot; value=&quot;SvelteKit Frontend\nSSR + Svelte 5 runes&quot; style=&quot;rounded=1;whiteSpace=wrap;fillColor=#1168BD;fontColor=#FFFFFF;strokeColor=#0B4884;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;380&quot; y=&quot;200&quot; width=&quot;200&quot; height=&quot;60&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;backend&quot; value=&quot;FastAPI Backend\nasync API, Pydantic validation&quot; style=&quot;rounded=1;whiteSpace=wrap;fillColor=#1168BD;fontColor=#FFFFFF;strokeColor=#0B4884;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;380&quot; y=&quot;340&quot; width=&quot;200&quot; height=&quot;60&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;nlp&quot; value=&quot;NLP Worker\nBERTopic + Sentiment + Toxicity&quot; style=&quot;rounded=1;whiteSpace=wrap;fillColor=#1168BD;fontColor=#FFFFFF;strokeColor=#0B4884;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;100&quot; y=&quot;340&quot; width=&quot;220&quot; height=&quot;60&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;scheduler&quot; value=&quot;APScheduler&quot; style=&quot;rounded=1;whiteSpace=wrap;fillColor=#85BBF0;fontColor=#000000;strokeColor=#5A9BD5;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;640&quot; y=&quot;350&quot; width=&quot;140&quot; height=&quot;40&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;postgres&quot; value=&quot;PostgreSQL 17\nposts, sentiment,\naggregations, DLQ&quot; style=&quot;shape=cylinder3;whiteSpace=wrap;fillColor=#438DD5;fontColor=#FFFFFF;strokeColor=#3A7BBD;size=12;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;200&quot; y=&quot;480&quot; width=&quot;180&quot; height=&quot;100&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;valkey&quot; value=&quot;Valkey 8\ncache, quota tracking&quot; style=&quot;shape=cylinder3;whiteSpace=wrap;fillColor=#438DD5;fontColor=#FFFFFF;strokeColor=#3A7BBD;size=12;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;520&quot; y=&quot;480&quot; width=&quot;180&quot; height=&quot;100&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;youtube&quot; value=&quot;YouTube API&quot; style=&quot;rounded=1;whiteSpace=wrap;fillColor=#999999;fontColor=#FFFFFF;strokeColor=#666666;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;900&quot; y=&quot;260&quot; width=&quot;160&quot; height=&quot;50&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;rss&quot; value=&quot;RSS Feeds&quot; style=&quot;rounded=1;whiteSpace=wrap;fillColor=#999999;fontColor=#FFFFFF;strokeColor=#666666;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;900&quot; y=&quot;330&quot; width=&quot;160&quot; height=&quot;50&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;trends&quot; value=&quot;Google Trends&quot; style=&quot;rounded=1;whiteSpace=wrap;fillColor=#999999;fontColor=#FFFFFF;strokeColor=#666666;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;900&quot; y=&quot;400&quot; width=&quot;160&quot; height=&quot;50&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;/root&gt;&lt;/mxGraphModel&gt;&lt;/diagram&gt;&lt;/mxfile&gt;">
  <defs/>
  <g>
    <!-- Title -->
    <text x="550" y="18" font-family="Helvetica" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">CommunityPulse — Current Architecture</text>

    <!-- User (UML Actor) -->
    <circle cx="510" cy="52" r="12" fill="#438DD5" stroke="#3A7BBD" stroke-width="2"/>
    <line x1="510" y1="64" x2="510" y2="95" stroke="#3A7BBD" stroke-width="2"/>
    <line x1="490" y1="76" x2="530" y2="76" stroke="#3A7BBD" stroke-width="2"/>
    <line x1="510" y1="95" x2="493" y2="115" stroke="#3A7BBD" stroke-width="2"/>
    <line x1="510" y1="95" x2="527" y2="115" stroke="#3A7BBD" stroke-width="2"/>
    <text x="510" y="132" font-family="Helvetica" font-size="12" fill="#438DD5" text-anchor="middle" font-weight="bold">User</text>

    <!-- System Boundary -->
    <rect x="60" y="155" width="780" height="490" rx="12" ry="12" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="80" y="178" font-family="Helvetica" font-size="14" font-weight="bold" fill="#888888">CommunityPulse</text>

    <!-- SvelteKit Frontend -->
    <rect x="390" y="200" width="240" height="60" rx="8" ry="8" fill="#1168BD" stroke="#0B4884" stroke-width="2"/>
    <text x="510" y="224" font-family="Helvetica" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">SvelteKit Frontend</text>
    <text x="510" y="242" font-family="Helvetica" font-size="11" fill="#FFFFFF" text-anchor="middle">SSR + Svelte 5 runes</text>

    <!-- FastAPI Backend -->
    <rect x="390" y="340" width="240" height="60" rx="8" ry="8" fill="#1168BD" stroke="#0B4884" stroke-width="2"/>
    <text x="510" y="364" font-family="Helvetica" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">FastAPI Backend</text>
    <text x="510" y="382" font-family="Helvetica" font-size="11" fill="#FFFFFF" text-anchor="middle">async API, Pydantic validation</text>

    <!-- NLP Worker -->
    <rect x="80" y="340" width="240" height="60" rx="8" ry="8" fill="#1168BD" stroke="#0B4884" stroke-width="2"/>
    <text x="200" y="364" font-family="Helvetica" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">NLP Worker</text>
    <text x="200" y="382" font-family="Helvetica" font-size="11" fill="#FFFFFF" text-anchor="middle">BERTopic + Sentiment + Toxicity</text>

    <!-- APScheduler (Component) -->
    <rect x="660" y="348" width="160" height="44" rx="6" ry="6" fill="#85BBF0" stroke="#5A9BD5" stroke-width="1.5"/>
    <text x="740" y="368" font-family="Helvetica" font-size="12" font-weight="bold" fill="#000000" text-anchor="middle">APScheduler</text>
    <text x="740" y="383" font-family="Helvetica" font-size="10" fill="#333333" text-anchor="middle">[component in Backend]</text>

    <!-- PostgreSQL 17 (Cylinder) -->
    <path d="M160,510 Q160,490 290,490 Q420,490 420,510 L420,580 Q420,600 290,600 Q160,600 160,580 Z" fill="#438DD5" stroke="#3A7BBD" stroke-width="2"/>
    <path d="M160,510 Q160,530 290,530 Q420,530 420,510" fill="none" stroke="#3A7BBD" stroke-width="1.5"/>
    <text x="290" y="552" font-family="Helvetica" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PostgreSQL 17</text>
    <text x="290" y="570" font-family="Helvetica" font-size="10" fill="#FFFFFF" text-anchor="middle">posts, sentiment, aggregations, DLQ</text>

    <!-- Valkey 8 (Cylinder) -->
    <path d="M500,510 Q500,490 610,490 Q720,490 720,510 L720,580 Q720,600 610,600 Q500,600 500,580 Z" fill="#438DD5" stroke="#3A7BBD" stroke-width="2"/>
    <path d="M500,510 Q500,530 610,530 Q720,530 720,510" fill="none" stroke="#3A7BBD" stroke-width="1.5"/>
    <text x="610" y="552" font-family="Helvetica" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Valkey 8</text>
    <text x="610" y="570" font-family="Helvetica" font-size="10" fill="#FFFFFF" text-anchor="middle">cache, quota tracking</text>

    <!-- External Systems -->
    <rect x="900" y="260" width="170" height="50" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="985" y="290" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">YouTube API</text>

    <rect x="900" y="330" width="170" height="50" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="985" y="360" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">RSS Feeds</text>

    <rect x="900" y="400" width="170" height="50" rx="8" ry="8" fill="#999999" stroke="#666666" stroke-width="2"/>
    <text x="985" y="430" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Google Trends</text>

    <!-- Arrows -->
    <!-- User -> Frontend -->
    <line x1="510" y1="132" x2="510" y2="200" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="530" y="170" font-family="Helvetica" font-size="10" fill="#999999">browses</text>

    <!-- Frontend -> Backend -->
    <line x1="510" y1="260" x2="510" y2="340" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="520" y="305" font-family="Helvetica" font-size="10" fill="#999999">REST API</text>

    <!-- Backend -> NLP Worker -->
    <line x1="390" y1="370" x2="320" y2="370" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="345" y="362" font-family="Helvetica" font-size="10" fill="#999999">dispatches</text>

    <!-- Backend -> PostgreSQL -->
    <line x1="460" y1="400" x2="340" y2="490" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="375" y="440" font-family="Helvetica" font-size="10" fill="#999999">reads/writes</text>

    <!-- Backend -> Valkey -->
    <line x1="560" y1="400" x2="590" y2="490" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="590" y="445" font-family="Helvetica" font-size="10" fill="#999999">cache</text>

    <!-- NLP Worker -> PostgreSQL -->
    <line x1="200" y1="400" x2="240" y2="490" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="195" y="450" font-family="Helvetica" font-size="10" fill="#999999">stores results</text>

    <!-- Backend -> External Sources -->
    <line x1="630" y1="355" x2="900" y2="285" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="760" y="305" font-family="Helvetica" font-size="10" fill="#999999">fetches</text>

    <line x1="630" y1="370" x2="900" y2="355" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <line x1="630" y1="385" x2="900" y2="425" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- APScheduler -> Backend -->
    <line x1="660" y1="370" x2="630" y2="370" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="640" y="362" font-family="Helvetica" font-size="9" fill="#999999">triggers</text>

    <!-- Arrowhead marker -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#707070"/>
      </marker>
    </defs>
  </g>
</svg>
