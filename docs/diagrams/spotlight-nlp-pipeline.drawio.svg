<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     version="1.1" width="1200px" height="580px" viewBox="0 0 1200 580"
     content="&lt;mxfile host=&quot;app.diagrams.net&quot; modified=&quot;2026-04-11T00:00:00.000Z&quot; agent=&quot;Claude&quot; version=&quot;26.0.0&quot; type=&quot;device&quot;&gt;&lt;diagram id=&quot;nlp-pipeline&quot; name=&quot;NLP Pipeline&quot;&gt;&lt;mxGraphModel dx=&quot;0&quot; dy=&quot;0&quot; grid=&quot;1&quot; gridSize=&quot;10&quot; guides=&quot;1&quot; tooltips=&quot;1&quot; connect=&quot;1&quot; arrows=&quot;1&quot; fold=&quot;1&quot; page=&quot;1&quot; pageScale=&quot;1&quot; pageWidth=&quot;1200&quot; pageHeight=&quot;580&quot;&gt;&lt;root&gt;&lt;mxCell id=&quot;0&quot;/&gt;&lt;mxCell id=&quot;1&quot; parent=&quot;0&quot;/&gt;&lt;/root&gt;&lt;/mxGraphModel&gt;&lt;/diagram&gt;&lt;/mxfile&gt;">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#707070"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CC4444"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#44AA44"/>
    </marker>
  </defs>
  <g>
    <!-- Title -->
    <text x="600" y="24" font-family="Helvetica" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">CommunityPulse — NLP Pipeline Detail</text>

    <!-- ===== MAIN PIPELINE (top row) ===== -->

    <!-- Raw Posts (input) -->
    <rect x="30" y="80" width="150" height="56" rx="8" ry="8" fill="#85BBF0" stroke="#5A9BD5" stroke-width="2"/>
    <text x="105" y="104" font-family="Helvetica" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Raw Posts</text>
    <text x="105" y="121" font-family="Helvetica" font-size="10" fill="#333333" text-anchor="middle">[input]</text>

    <!-- Arrow: Raw Posts -> Toxicity Filter -->
    <line x1="180" y1="108" x2="240" y2="108" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- Toxicity Filter -->
    <rect x="240" y="80" width="180" height="56" rx="8" ry="8" fill="#1168BD" stroke="#0B4884" stroke-width="2"/>
    <text x="330" y="104" font-family="Helvetica" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Toxicity Filter</text>
    <text x="330" y="121" font-family="Helvetica" font-size="10" fill="#FFFFFF" text-anchor="middle">[classification]</text>

    <!-- Arrow: Toxicity -> Topic Detection -->
    <line x1="420" y1="108" x2="480" y2="108" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- Topic Detection -->
    <rect x="480" y="80" width="210" height="56" rx="8" ry="8" fill="#1168BD" stroke="#0B4884" stroke-width="2"/>
    <text x="585" y="100" font-family="Helvetica" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Topic Detection</text>
    <text x="585" y="121" font-family="Helvetica" font-size="10" fill="#FFFFFF" text-anchor="middle">[BERTopic]</text>

    <!-- Arrow: Topic -> Sentiment -->
    <line x1="690" y1="108" x2="750" y2="108" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- Sentiment Analysis -->
    <rect x="750" y="80" width="210" height="56" rx="8" ry="8" fill="#1168BD" stroke="#0B4884" stroke-width="2"/>
    <text x="855" y="100" font-family="Helvetica" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Sentiment Analysis</text>
    <text x="855" y="121" font-family="Helvetica" font-size="10" fill="#FFFFFF" text-anchor="middle">[RoBERTa]</text>

    <!-- Arrow: Sentiment -> Results Store -->
    <line x1="960" y1="108" x2="1010" y2="108" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- Results Store (Cylinder) -->
    <path d="M1010,80 Q1010,65 1095,65 Q1180,65 1180,80 L1180,136 Q1180,151 1095,151 Q1010,151 1010,136 Z" fill="#438DD5" stroke="#3A7BBD" stroke-width="2"/>
    <path d="M1010,80 Q1010,95 1095,95 Q1180,95 1180,80" fill="none" stroke="#3A7BBD" stroke-width="1.5"/>
    <text x="1095" y="118" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PostgreSQL</text>
    <text x="1095" y="134" font-family="Helvetica" font-size="10" fill="#FFFFFF" text-anchor="middle">Results Store</text>

    <!-- ===== CIRCUIT BREAKER SECTION ===== -->

    <!-- Circuit Breaker box -->
    <rect x="390" y="220" width="340" height="120" rx="10" ry="10" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="560" y="245" font-family="Helvetica" font-size="14" font-weight="bold" fill="#555555" text-anchor="middle">Circuit Breaker</text>

    <!-- State boxes inside -->
    <rect x="405" y="260" width="90" height="36" rx="5" ry="5" fill="#44AA44" stroke="#338833" stroke-width="1.5"/>
    <text x="450" y="283" font-family="Helvetica" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">CLOSED</text>

    <rect x="515" y="260" width="100" height="36" rx="5" ry="5" fill="#CC4444" stroke="#AA2222" stroke-width="1.5"/>
    <text x="565" y="283" font-family="Helvetica" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">OPEN</text>

    <rect x="635" y="260" width="80" height="36" rx="5" ry="5" fill="#DD9922" stroke="#BB7711" stroke-width="1.5"/>
    <text x="675" y="283" font-family="Helvetica" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">HALF-OPEN</text>

    <!-- State descriptions -->
    <text x="450" y="310" font-family="Helvetica" font-size="9" fill="#666666" text-anchor="middle">(normal)</text>
    <text x="565" y="310" font-family="Helvetica" font-size="9" fill="#666666" text-anchor="middle">(failures exceeded</text>
    <text x="565" y="322" font-family="Helvetica" font-size="9" fill="#666666" text-anchor="middle">threshold)</text>
    <text x="675" y="310" font-family="Helvetica" font-size="9" fill="#666666" text-anchor="middle">(cooldown</text>
    <text x="675" y="322" font-family="Helvetica" font-size="9" fill="#666666" text-anchor="middle">expired)</text>

    <!-- Arrows from model boxes down to circuit breaker -->
    <line x1="330" y1="136" x2="450" y2="220" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="365" y="175" font-family="Helvetica" font-size="10" fill="#999999">on failure</text>

    <line x1="585" y1="136" x2="560" y2="220" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <line x1="855" y1="136" x2="680" y2="220" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- ===== DEAD LETTER QUEUE ===== -->

    <!-- DLQ (Cylinder) -->
    <path d="M460,400 Q460,385 560,385 Q660,385 660,400 L660,460 Q660,475 560,475 Q460,475 460,460 Z" fill="#438DD5" stroke="#3A7BBD" stroke-width="2"/>
    <path d="M460,400 Q460,415 560,415 Q660,415 660,400" fill="none" stroke="#3A7BBD" stroke-width="1.5"/>
    <text x="560" y="438" font-family="Helvetica" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Dead Letter Queue</text>
    <text x="560" y="456" font-family="Helvetica" font-size="10" fill="#FFFFFF" text-anchor="middle">(DLQ)</text>

    <!-- Arrow: Circuit Breaker OPEN -> DLQ -->
    <line x1="560" y1="340" x2="560" y2="385" stroke="#CC4444" stroke-width="1.5" marker-end="url(#arrowhead-red)"/>
    <text x="575" y="365" font-family="Helvetica" font-size="10" fill="#CC4444">when OPEN</text>

    <!-- Retry box -->
    <rect x="180" y="410" width="140" height="48" rx="8" ry="8" fill="#85BBF0" stroke="#5A9BD5" stroke-width="2"/>
    <text x="250" y="432" font-family="Helvetica" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Retry</text>
    <text x="250" y="448" font-family="Helvetica" font-size="10" fill="#333333" text-anchor="middle">[exponential backoff]</text>

    <!-- Arrow: DLQ -> Retry -->
    <line x1="460" y1="434" x2="320" y2="434" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="390" y="425" font-family="Helvetica" font-size="10" fill="#999999">dequeue</text>

    <!-- Arrow: Retry -> back to pipeline (Raw Posts level) -->
    <path d="M180,434 L105,434 L105,136" fill="none" stroke="#44AA44" stroke-width="1.5" marker-end="url(#arrowhead-green)"/>
    <text x="115" y="290" font-family="Helvetica" font-size="10" fill="#44AA44">re-enter pipeline</text>

    <!-- Legend -->
    <rect x="30" y="510" width="360" height="56" rx="6" ry="6" fill="#F8F8F8" stroke="#CCCCCC" stroke-width="1"/>
    <text x="50" y="530" font-family="Helvetica" font-size="11" font-weight="bold" fill="#555555">Legend:</text>
    <line x1="110" y1="526" x2="140" y2="526" stroke="#707070" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="148" y="530" font-family="Helvetica" font-size="10" fill="#666666">data flow</text>
    <line x1="230" y1="526" x2="260" y2="526" stroke="#CC4444" stroke-width="1.5" marker-end="url(#arrowhead-red)"/>
    <text x="268" y="530" font-family="Helvetica" font-size="10" fill="#666666">failure path</text>
    <line x1="110" y1="550" x2="140" y2="550" stroke="#44AA44" stroke-width="1.5" marker-end="url(#arrowhead-green)"/>
    <text x="148" y="554" font-family="Helvetica" font-size="10" fill="#666666">retry path</text>
  </g>
</svg>
